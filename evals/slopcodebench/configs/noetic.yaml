# SlopCodeBench agent config for the Noetic code agent.
# Resolved by `--agent <path>` and instantiated via the `noetic` registry entry
# that launch.py registers (see adapter.py). The model is supplied separately by
# `--model openrouter/<name>`.
type: noetic
runtime: bun
solve_timeout: 1800
cost_limits:
  # 0 = no cost ceiling; the run is bounded by the agent workflow terminating.
  cost_limit: 0
  step_limit: 100
  net_cost_limit: 0
