name: Release @noetic-tools/memory

on:
  push:
    branches: [main]
    paths:
      - 'packages/memory/**'
      - '.github/workflows/release-memory.yml'
      # Root build config that can affect the published output.
      - 'biome.json'
      - 'bun.lock'
  workflow_dispatch:

concurrency:
  group: release-memory
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bunx biome check packages/memory

      - name: Typecheck
        run: bun --cwd=packages/memory run typecheck

      # @noetic-tools/memory depends on @noetic-tools/types. Build the dependency's
      # dist first so memory's own build (run by `prepublishOnly`) and the Node
      # ESM smoke test can resolve `@noetic-tools/types` via node_modules.
      - name: Build dependency (@noetic-tools/types)
        run: bun --cwd=packages/types run build

      - name: Build
        run: bun --cwd=packages/memory run build

      # semantic-release runs `npm version`, which builds the full workspace tree
      # and chokes on sibling packages' `workspace:*` deps (EUNSUPPORTEDPROTOCOL).
      # Drop the root `workspaces` field so npm treats the package as standalone.
      # The package's own `workspace:*` deps are pinned to concrete versions at
      # publish time by `prepublishOnly` (scripts/pin-workspace-deps.ts).
      - name: Detach package from workspace for npm
        run: node -e "const fs=require('fs');const p=require('./package.json');delete p.workspaces;fs.writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Release
        working-directory: packages/memory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: npx --yes -p semantic-release@24 -p semantic-release-monorepo@8 -p @semantic-release/changelog@6 -p @semantic-release/git@10 -p conventional-changelog-conventionalcommits@7 semantic-release --extends semantic-release-monorepo
