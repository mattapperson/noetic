name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  publish-npm:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # @noetic-tools/core resolves to its dist/ even in dev, so it must be built
      # before the bundler can inline it into code-agent/cli.
      - name: Build @noetic-tools/core
        working-directory: packages/core
        run: bun run build

      - name: Build @noetic/code-agent
        working-directory: packages/code-agent
        run: bun run build

      - name: Build @noetic/cli
        working-directory: packages/cli
        run: bun run build

      # Rewrite each manifest for publish: apply publishConfig (entry points -> dist)
      # and drop devDependencies (which carry the bun `workspace:` protocol). The
      # `@noetic/*` workspace packages are bundled into dist by the build above, so
      # they are not runtime deps. `--ignore-scripts` skips prepublishOnly (it would
      # rebuild from the rewritten manifest); `--no-workspaces` stops npm from
      # traversing sibling packages that still use `workspace:*`.
      - name: Prepare @noetic/code-agent manifest
        run: bun scripts/prepare-publish.ts packages/code-agent

      - name: Publish @noetic/code-agent
        working-directory: packages/code-agent
        run: npm publish --access public --provenance --no-workspaces --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare @noetic/cli manifest
        run: bun scripts/prepare-publish.ts packages/cli

      - name: Publish @noetic/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance --no-workspaces --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  binaries:
    name: Compile CLI binaries
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The compiled binary bundles @noetic-tools/core, which resolves to dist/.
      - name: Build @noetic-tools/core
        working-directory: packages/core
        run: bun run build

      - name: Compile binaries
        working-directory: packages/cli
        run: bun run build:binary

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: packages/cli/dist-bin/*
          fail_on_unmatched_files: true
