name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # Build the foundational dists in dependency order. Consumers (eval,
      # docs, the test suites) resolve `@noetic-tools/core` via its built
      # `dist/*.d.ts`/`*.js`, and core's own build resolves @noetic-tools/types
      # and @noetic-tools/memory via their dists. Without this, tsc/bun can't
      # find the packages and the typecheck/test steps fail.
      - name: Build packages
        run: |
          bun --cwd=packages/types run build
          bun --cwd=packages/memory run build
          bun --cwd=packages/core run build

      - name: Lint
        run: bunx biome check .

      - name: Typecheck types
        run: bun --cwd=packages/types run typecheck

      - name: Typecheck memory
        run: bun --cwd=packages/memory run typecheck

      - name: Typecheck core
        run: bun --cwd=packages/core run typecheck

      - name: Typecheck eval
        run: bun --cwd=packages/eval run typecheck

      - name: Check export tags
        run: bun run check:exports

      - name: Typecheck docs
        run: bun --cwd=packages/web run typecheck:docs

      - name: Test types
        run: bun --cwd=packages/types run test:ci

      - name: Test memory
        run: bun --cwd=packages/memory run test:ci

      - name: Test core
        run: bun --cwd=packages/core run test:ci

      - name: Test eval
        run: bun --cwd=packages/eval run test:ci

      - name: Build web
        run: bun --cwd=packages/web run test:build

      - name: Link check
        run: bun --cwd=packages/web run test:links

      - name: Eval regression (if baselines exist)
        if: hashFiles('.noetic/baselines/**') != ''
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            bun --cwd=packages/eval run noetic test --regression --fail-on-regression
          else
            bun --cwd=packages/eval run noetic test --regression || echo "::warning::Eval regression detected — scores degraded on this PR"
          fi

  structural-gate:
    name: Structural gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install sentrux
        env:
          SENTRUX_VERSION: v0.5.7
        run: |
          curl -fsSL \
            "https://github.com/sentrux/sentrux/releases/download/${SENTRUX_VERSION}/sentrux-linux-x86_64" \
            -o /usr/local/bin/sentrux
          chmod +x /usr/local/bin/sentrux
          sentrux --version

      - name: Structural regression gate
        run: sentrux gate .
