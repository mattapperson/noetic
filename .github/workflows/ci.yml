name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # Build the foundational dists in dependency order. Consumers (eval,
      # docs, the test suites) resolve `@noetic-tools/core` via its built
      # `dist/*.d.ts`/`*.js`, and core's own build resolves @noetic-tools/types
      # and @noetic-tools/memory via their dists. Without this, tsc/bun can't
      # find the packages and the typecheck/test steps fail.
      - name: Build packages
        run: |
          bun run --cwd packages/types build
          bun run --cwd packages/memory build
          bun run --cwd packages/core build

      - name: Lint
        run: bunx biome check .

      # NOTE: use `bun run --cwd <path> <script>`, NOT `bun --cwd <path> run <script>`.
      # The latter form no-ops on Bun >=1.3 (prints help, exits 0) — a false green.
      # Dists are already built up front by the "Build packages" step above, in
      # dependency order (types → memory → core), so downstream typechecks/tests
      # resolve cross-package imports via the emitted dist.
      - name: Typecheck types
        run: bun run --cwd packages/types typecheck

      - name: Typecheck memory
        run: bun run --cwd packages/memory typecheck

      - name: Typecheck core
        run: bun run --cwd packages/core typecheck

      - name: Typecheck eval
        run: bun run --cwd packages/eval typecheck

      - name: Check export tags
        run: bun run check:exports

      - name: Check docs (Kiira)
        run: bun run --cwd packages/web check:docs

      - name: Test types
        run: bun run --cwd packages/types test:ci

      - name: Test memory
        run: bun run --cwd packages/memory test:ci

      - name: Test core
        run: bun run --cwd packages/core test:ci

      - name: Test eval
        run: bun run --cwd packages/eval test:ci

      - name: Build web
        run: bun run --cwd packages/web test:build

      - name: Install lychee
        run: |
          curl -fsSL \
            "https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz --strip-components=1 lychee-x86_64-unknown-linux-gnu/lychee
          sudo mv lychee /usr/local/bin/
          lychee --version

      - name: Link check
        run: bun run --cwd packages/web test:links

      - name: Eval regression (if baselines exist)
        if: hashFiles('.noetic/baselines/**') != ''
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            bun run --cwd packages/eval src/cli/cli.ts test --regression --fail-on-regression
          else
            bun run --cwd packages/eval src/cli/cli.ts test --regression || echo "::warning::Eval regression detected — scores degraded on this PR"
          fi

  structural-gate:
    name: Structural gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install sentrux
        env:
          SENTRUX_VERSION: v0.5.7
        run: |
          curl -fsSL \
            "https://github.com/sentrux/sentrux/releases/download/${SENTRUX_VERSION}/sentrux-linux-x86_64" \
            -o /usr/local/bin/sentrux
          chmod +x /usr/local/bin/sentrux
          sentrux --version

      - name: Structural regression gate
        run: sentrux gate .
