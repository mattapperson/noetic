# ─────────────────────────────────────────────────────────────────────────────
# Sub-harness packages. The SubHarness contract lives in @noetic-tools/types;
# the base @noetic-tools/sub-harness package adds the registry / turn
# accumulator / item builders and depends only on types. Each per-tool adapter
# (@noetic-tools/sub-harness-{claude-code,codex,opencode,pi}) depends on the
# base + types and is a pure adapter — it must NOT import core. Critically,
# @noetic-tools/core must never import a sub-harness adapter (or the base): core
# resolves SubHarness *instances* from a runtime registry / the step field and
# depends only on the SubHarness *type* in @noetic-tools/types. These boundaries
# machine-enforce that decoupling.
# ─────────────────────────────────────────────────────────────────────────────

[[layers]]
name = "sub-harness-adapters"
paths = ["packages/sub-harness-*/src/**"]
order = 50

[[layers]]
name = "noetic-sub-harness"
paths = ["packages/sub-harness/src/**"]
order = 88

[[boundaries]]
from = "packages/core/src/**"
to = "packages/sub-harness/src/**"
reason = "core must never depend on a sub-harness package; it resolves SubHarness instances from a runtime registry and depends only on the SubHarness type in @noetic-tools/types"

[[boundaries]]
from = "packages/core/src/**"
to = "packages/sub-harness-*/src/**"
reason = "core must never depend on a sub-harness adapter; adapter instances are injected by the consumer, never imported by core"

[[boundaries]]
from = "packages/sub-harness/src/**"
to = "packages/core/src/**"
reason = "@noetic-tools/sub-harness is a foundational package on @noetic-tools/types; it must never import back into core (acyclic)"

[[boundaries]]
from = "packages/sub-harness/src/**"
to = "packages/memory/src/**"
reason = "@noetic-tools/sub-harness depends only on @noetic-tools/types; it must not reach into the memory package"

[[boundaries]]
from = "packages/sub-harness/src/**"
to = "packages/sub-harness-*/src/**"
reason = "the base sub-harness package must not import its own consumer adapter packages"

[[boundaries]]
from = "packages/sub-harness-*/src/**"
to = "packages/core/src/**"
reason = "a sub-harness adapter is a pure adapter on the SubHarness contract; it must not depend on core"

[[boundaries]]
from = "packages/sub-harness-*/src/**"
to = "packages/memory/src/**"
reason = "a sub-harness adapter depends only on @noetic-tools/sub-harness + @noetic-tools/types; it must not reach into the memory package"
