# ─────────────────────────────────────────────────────────────────────────────
# Tier D — core-internal layers (packages/core/src/**)
# Ordered per the dependency graph in specs/00-overview.md: harness →
# patterns → adapters → interpreter → runtime → primitives →
# memory/observability → foundations.
# ─────────────────────────────────────────────────────────────────────────────

[[layers]]
name = "core-harness"
paths = ["packages/core/src/harness/**"]
order = 79

[[layers]]
name = "core-patterns"
paths = ["packages/core/src/patterns/**"]
order = 80

[[layers]]
name = "core-adapters"
paths = ["packages/core/src/adapters/**"]
order = 81

[[layers]]
name = "core-interpreter"
paths = ["packages/core/src/interpreter/**"]
order = 82

[[layers]]
name = "core-runtime"
paths = ["packages/core/src/runtime/**"]
order = 83

[[layers]]
name = "core-primitives"
paths = [
  "packages/core/src/builders/**",
  "packages/core/src/conditions/**",
  "packages/core/src/until/**",
]
order = 84

[[layers]]
name = "core-observability"
paths = ["packages/core/src/observability/**"]
order = 85

[[layers]]
