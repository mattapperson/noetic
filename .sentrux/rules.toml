# ─────────────────────────────────────────────────────────────────────────────
# Tier E — foundational shared packages. The memory layer system and the
# type/contract vocabulary it builds on were extracted from core so they can
# ship as standalone npm packages (@noetic-tools/memory, @noetic-tools/types).
# They sit BELOW every core layer: core imports them, never the reverse.
# @noetic-tools/types is the dependency-free bottom; @noetic-tools/memory
# builds on types and is consumed by core.
# ─────────────────────────────────────────────────────────────────────────────

[[layers]]
name = "noetic-memory"
paths = ["packages/memory/src/**"]
order = 88

[[layers]]
name = "noetic-types"
paths = ["packages/types/src/**"]
order = 90

# ─────────────────────────────────────────────────────────────────────────────
# Foundation acyclicity + memory tree-shakability. @noetic-tools/memory and
# @noetic-tools/types are extracted foundational packages: core depends on
# them, never the reverse. A memory layer importing back into core would
# both create a package cycle and defeat tree-shakability (importing one
# layer must not pull in the interpreter/runtime). @noetic-tools/types is
# the dependency-free bottom of the stack.
# ─────────────────────────────────────────────────────────────────────────────

[[boundaries]]
from = "packages/memory/src/**"
to = "packages/core/src/**"
reason = "core depends on @noetic-tools/memory; memory must never import back into core (acyclic) and must stay tree-shakable from the interpreter/runtime"

[[boundaries]]
from = "packages/types/src/**"
to = "packages/memory/src/**"
reason = "@noetic-tools/types is the dependency-free foundation; @noetic-tools/memory builds on it, not the reverse"

[[boundaries]]
from = "packages/types/src/**"
to = "packages/core/src/**"
reason = "@noetic-tools/types is the dependency-free foundation; core builds on it, not the reverse"

# ─────────────────────────────────────────────────────────────────────────────
# Peer-package isolation at tier 50 — code-agent and eval are
# siblings that depend only on @noetic-tools/core; they must not reach across.
# Same-order layers are otherwise unconstrained, so these have to be
# explicit.
# ─────────────────────────────────────────────────────────────────────────────

[[boundaries]]
from = "packages/eval/src/**"
to = "packages/code-agent/src/**"
reason = "eval is a peer of code-agent; both depend only on @noetic-tools/core"

[[boundaries]]
from = "packages/eval/src/**"
to = "packages/cli/src/**"
reason = "eval must not depend on cli"

[[boundaries]]
from = "packages/code-agent/src/**"
to = "packages/eval/src/**"
reason = "code-agent must not depend on eval"

# ─────────────────────────────────────────────────────────────────────────────
# Platform packages: runtime-isolated, peer-isolated, and core is forbidden
# from reaching into either. The invariant is that @noetic-tools/core carries no
# runtime-specific code — only contracts + in-memory adapters — and that the
# two platform packages never see each other so bundlers can drop one
# entirely from a target's output.
# ─────────────────────────────────────────────────────────────────────────────

[[boundaries]]
from = "packages/platform-node/src/**"
to = "packages/platform-browser/src/**"
reason = "platform packages must stay runtime-isolated; neither may import from the other"

[[boundaries]]
from = "packages/platform-browser/src/**"
to = "packages/platform-node/src/**"
reason = "platform packages must stay runtime-isolated; neither may import from the other"

[[boundaries]]
from = "packages/core/src/**"
to = "packages/platform-node/src/**"
reason = "core is runtime-agnostic; it cannot depend on a specific platform"

[[boundaries]]
from = "packages/core/src/**"
to = "packages/platform-browser/src/**"
reason = "core is runtime-agnostic; it cannot depend on a specific platform"

[[boundaries]]
from = "packages/memory/src/**"
to = "packages/platform-node/src/**"
reason = "memory layers are platform-independent; platform packages are platform-specific"

[[boundaries]]
from = "packages/memory/src/**"
to = "packages/platform-browser/src/**"
reason = "memory layers are platform-independent; platform packages are platform-specific"

[[boundaries]]
from = "packages/platform-node/src/**"
to = "packages/code-agent/src/**"
reason = "platform-node is a peer of code-agent; both depend only on @noetic-tools/core"

[[boundaries]]
from = "packages/platform-node/src/**"
to = "packages/eval/src/**"
reason = "platform-node is a peer of eval; both depend only on @noetic-tools/core"

[[boundaries]]
from = "packages/platform-node/src/**"
to = "packages/cli/src/**"
reason = "platform-node must not depend on cli"

[[boundaries]]
from = "packages/platform-browser/src/**"
to = "packages/code-agent/src/**"
reason = "platform-browser is a peer of code-agent; both depend only on @noetic-tools/core"

[[boundaries]]
from = "packages/platform-browser/src/**"
to = "packages/eval/src/**"
reason = "platform-browser is a peer of eval; both depend only on @noetic-tools/core"

[[boundaries]]
from = "packages/platform-browser/src/**"
to = "packages/cli/src/**"
reason = "platform-browser must not depend on cli"

# Reverse direction: Node-only consumers must not reach into the
# browser platform package. Nothing in cli/code-agent/eval
# should accidentally pull browser-only exports — the import itself
# would be harmless today (platform-browser re-exports in-memory
# adapters), but bundlers targeting Node shouldn't follow this edge
# and the rule lets us add browser-specific code later without a
# migration.

[[boundaries]]
from = "packages/cli/src/**"
to = "packages/platform-browser/src/**"
reason = "cli is Node-only; must not reach into the browser platform package"

[[boundaries]]
from = "packages/code-agent/src/**"
to = "packages/platform-browser/src/**"
reason = "code-agent is Node-only; must not reach into the browser platform package"

[[boundaries]]
from = "packages/eval/src/**"
to = "packages/platform-browser/src/**"
reason = "eval is runtime-agnostic via adapter injection; a direct browser-platform import would pin its runtime"

# ─────────────────────────────────────────────────────────────────────────────
# Docs-site isolation (@noetic/web) is enforced via packages/web/package.json
# workspace deps, NOT via rules.toml — the .typecheck-snippets-shims/ dir has
# a legitimate type-only import of @noetic-tools/core for MDX snippet typechecking
# that any file-path-level boundary would flag as a false positive.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Tier F — sub-harness packages. @noetic-tools/sub-harness is the base contract
# + helpers for coding-agent harnesses (Claude Code, Codex, opencode, pi) and
# depends only on @noetic-tools/types. Each @noetic-tools/sub-harness-<tool>
# adapter depends only on the base. core resolves sub-harnesses through the
# @noetic-tools/types contract + a runtime registry, so it must NEVER import the
# base or any adapter — agent SDKs never enter core's dependency graph.
# ─────────────────────────────────────────────────────────────────────────────

[[layers]]
name = "sub-harness-claude-code"
paths = ["packages/sub-harness-claude-code/src/**"]
order = 49

[[layers]]
name = "sub-harness-codex"
paths = ["packages/sub-harness-codex/src/**"]
order = 49

[[layers]]
name = "sub-harness-opencode"
paths = ["packages/sub-harness-opencode/src/**"]
order = 49

[[layers]]
name = "sub-harness-pi"
paths = ["packages/sub-harness-pi/src/**"]
order = 49

[[layers]]
name = "sub-harness"
paths = ["packages/sub-harness/src/**"]
order = 87

# @noetic-tools/openui builds on @noetic-tools/memory + @noetic-tools/types (the
# openUiSurface memory layer + the OutputCodec/UiFragment contracts) and is a
# consumer package like the sub-harness base — it sits above memory/types and
# below every core layer. core sees only the dialect-agnostic contracts in
# types; it must never import openui or pull the OpenUI parser/transport into
# its dependency graph (see specs/28-generative-ui.md).
[[layers]]
name = "openui"
paths = ["packages/openui/src/**"]
order = 87

[[boundaries]]
from = "packages/core/src/**"
to = "packages/openui/src/**"
reason = "core resolves generative-UI output via the @noetic-tools/types OutputCodec/UiFragment contracts; it must never import @noetic-tools/openui or pull the OpenUI Lang parser/surface/transport into its dependency graph"

[[boundaries]]
from = "packages/memory/src/**"
to = "packages/openui/src/**"
reason = "@noetic-tools/openui depends on @noetic-tools/memory (the openUiSurface layer builds on it); memory must never import back into openui (acyclic + tree-shakable)"

[[boundaries]]
from = "packages/core/src/**"
to = "packages/sub-harness/src/**"
reason = "core resolves sub-harnesses via the @noetic-tools/types contract + a runtime registry; it must never import the sub-harness package or pull an agent SDK into its dependency graph"

[[boundaries]]
